spring:
  # 数据库配置文件
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:classroombookingdb}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: YOUR_DB_PASSWORD  # 改成自己的数据库密码
  mail:
    host: smtp.163.com # 邮件服务器地址
    port: 25  # 端口号（SSL 用 465，STARTTLS 用 25/587）
    username: YOUR_EMAIL@163.com  # 改成自己的邮箱账号(可选)
    password: YOUR_EMAIL_AUTH_CODE  # 改成自己的邮箱授权码
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8
    mode: HTML
  servlet:
    multipart:
      #最大请求大小
      max-request-size: 100MB
      #单个文件大小
      max-file-size: 10MB
  application:
    name: classroom-booking-system
mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    #方式三开启驼峰命名
    map-underscore-to-camel-case: true

alioss:
  endpoint:
  accessKeyId:
  bucketName:
  accessKeySecret:

server:
  port: 8099
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# 日志配置
logging:
  level:
    org.springframework.jdbc.support.JdbcTransactionManager: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    encoding: UTF-8
