spring:
  # 数据库配置文件
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:piano_room_booking}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  mail:
    host: ${MAIL_HOST:smtp.163.com}
    port: ${MAIL_PORT:25}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
            required: ${MAIL_SMTP_STARTTLS_REQUIRED:true}
          connectiontimeout: ${MAIL_CONNECTION_TIMEOUT:5000}
          timeout: ${MAIL_TIMEOUT:5000}
          writetimeout: ${MAIL_WRITE_TIMEOUT:5000}
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8
    mode: HTML
  servlet:
    multipart:
      #最大请求大小
      max-request-size: 100MB
      #单个文件大小
      max-file-size: 10MB
  application:
    name: classroom-booking-system
mybatis:
  configuration:
    #方式三开启驼峰命名
    map-underscore-to-camel-case: true

alioss:
  endpoint: ${ALIOSS_ENDPOINT:}
  accessKeyId: ${ALIOSS_ACCESS_KEY_ID:}
  bucketName: ${ALIOSS_BUCKET_NAME:}
  accessKeySecret: ${ALIOSS_ACCESS_KEY_SECRET:}

server:
  port: 8099
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# 日志配置
logging:
  level:
    root: INFO
    com.bookingsystem: INFO
    org.springframework.jdbc.support.JdbcTransactionManager: INFO
    org.apache.ibatis: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    encoding: UTF-8

jwt:
  secret: ${JWT_SECRET}

app:
  security:
    public-registration-enabled: ${APP_PUBLIC_REGISTRATION_ENABLED:false}
